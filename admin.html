<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Fidirana</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#e91e63,#ff9800);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-box{background:#1a1a1a;padding:45px;border-radius:28px;text-align:center;width:350px}
        .login-box h2{color:#e91e63;margin-bottom:25px}
        .login-box input{width:100%;padding:14px;margin:15px 0;border:1px solid #333;border-radius:12px;background:#0a0a0a;color:white}
        .login-box button{background:#e91e63;color:white;border:none;padding:14px;width:100%;border-radius:40px;cursor:pointer;font-weight:bold}
        .error{color:#ff6b6b;margin-bottom:15px}
        .back-link{display:block;margin-top:15px;color:#aaa;text-decoration:none}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Admin - Fidirana</h2>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Teny miafina" required>
            <button type="submit">Midira</button>
        </form>
        <a href="/view" class="back-link">← Miverina any amin'ny View</a>
    </div>
</body>
</html>
