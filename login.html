{% extends "base.html" %}
{% block content %}
<div class="login-container">
    <h1>{{ t('se_connecter') }}</h1>
    <form method="POST">
        <input type="text" name="contact" placeholder="{{ t('email_ou_tel') }}" required>
        <input type="password" name="mot_de_passe" placeholder="{{ t('mot_de_passe') }}" required>
        <button type="submit">{{ t('se_connecter_btn') }}</button>
    </form>
    <p style="text-align:center; margin-top:15px">{{ t('pas_encore_inscrit') }} <a href="/register">{{ t('creer_compte') }}</a></p>
</div>
{% endblock %}
